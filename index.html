<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htmlcss-discord-chat</title>
    <link rel="stylesheet" href="css/stylesheet.css">
</head>
<body>
    <main class="container">
        <div class="home">
            <div class="sidebar">
                <div class="server">
                    <img class="logo" src="imgs/logo.webp" alt="logo discord">
                </div>
                <div class="server">
                    <img src="imgs/server arte.png" alt="server arte">
                </div>
                <div class="server">
                    <img src="imgs/server_boolean.png" alt="server boolean">
                </div>
                <div class="server">
                    <img src="imgs/server_italia.png" alt="server italia">
                </div>
                <div class="server">
                    <img src="imgs/server_nintendo.png" alt="server nintendo">
                </div>
                <div class="server">
                    <img src="imgs/server_javascript.png" alt="server javascript">
                </div>
                <div class="server">
                    <img src="imgs/server_pokemon.png" alt="server pokemon">
                </div>
            </div>
            <div class="messages"></div>
        </div>
    </main>
    <footer class="footer-nav container"></footer>
    
</body>
</html>
